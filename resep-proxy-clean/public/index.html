<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Generator Resep dari Work Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#111; --line:#333; }
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#eef1f4;color:var(--ink);}
  header{background:#1e3a5f;color:#fff;padding:14px 24px;}
  header h1{margin:0;font-size:18px;}
  header p{margin:2px 0 0;font-size:12px;opacity:.85;}
  .wrap{display:flex;gap:16px;padding:16px;align-items:flex-start;flex-wrap:wrap;}
  .panel{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .panel h2{font-size:14px;margin:0 0 10px;border-bottom:1px solid #ddd;padding-bottom:6px;}
  #controls{width:380px;flex:0 0 380px;}
  #preview{flex:1;min-width:400px;}
  label{display:block;font-size:12px;font-weight:bold;margin:8px 0 3px;}
  input[type=text],input[type=password],input[type=date],input[type=number]{width:100%;padding:5px 7px;border:1px solid #ccc;border-radius:4px;font-size:13px;}
  input[type=file]{font-size:12px;}
  button{cursor:pointer;border:none;border-radius:5px;padding:8px 12px;font-size:13px;font-weight:bold;}
  .btn-primary{background:#1e3a5f;color:#fff;}
  .btn-primary:hover{background:#16324f;}
  .btn-secondary{background:#e2e6ea;color:#222;}
  .btn-danger{background:#c0392b;color:#fff;padding:4px 8px;font-size:11px;}
  .btn-add{background:#2e7d32;color:#fff;}
  .row{display:flex;gap:6px;}
  .row>div{flex:1;}
  #status{font-size:12px;margin-top:8px;padding:6px 8px;border-radius:4px;display:none;}
  #status.ok{display:block;background:#e6f4ea;color:#1e7d34;}
  #status.err{display:block;background:#fdecea;color:#b3261e;}
  #status.busy{display:block;background:#fff4e0;color:#8a5a00;}
  .thumb{max-width:100%;border:1px solid #ddd;border-radius:4px;margin-top:8px;}

  .resep-card{border:1px solid #d9d9d9;border-radius:6px;padding:10px;margin-bottom:10px;background:#fafbfc;}
  .resep-card h3{font-size:12px;margin:0 0 6px;color:#1e3a5f;}
  .obat-row{display:flex;gap:6px;margin-bottom:5px;align-items:center;}
  .obat-row input{flex:1;}
  .obat-row input.jml{max-width:60px;}
  .obat-row span{font-size:16px;color:#888;}

  /* ===== Print sheet ===== */
  #sheetArea{}
  .page{
    width:215mm; height:330mm;
    background:#fff;
    display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
    margin:0 auto 20px; box-shadow:0 1px 6px rgba(0,0,0,.25);
    page-break-after:always;
  }
  .cell{
    border:1px dashed #bbb;
    padding:5mm 6mm;
    position:relative;
    display:flex; flex-direction:column;
    font-size:9.5px;
    overflow:hidden;
  }
  .cell.empty{border:1px dashed #eee;}
  .cell .rm{font-family:'Caveat',cursive;font-size:17px;font-weight:600;position:absolute;top:4mm;left:6mm;color:#1a1a2e;}
  .cell .headerblock{display:flex;justify-content:space-between;margin-top:9mm;border-bottom:1.2px solid #000;padding-bottom:2mm;}
  .cell .rs-logo-wrap{display:flex;align-items:flex-start;gap:2mm;}
  .cell .rs-logo-img{width:11mm;height:auto;flex:none;}
  .cell .rs-logo{font-weight:bold;font-size:10px;line-height:1.25;}
  .cell .rs-logo .rs-name2{font-size:11px;}
  .cell .rs-addr{font-size:7.5px;font-weight:normal;color:#222;margin-top:1mm;}
  .cell .resep-box{border:1px solid #000;font-weight:bold;font-size:9px;padding:1mm 4mm;height:fit-content;}
  .cell .doctor-block{text-align:right;}
  .cell .doctor-block .dname{font-family:'Caveat',cursive;font-size:18px;font-weight:600;color:#1a1a2e;}
  .cell .doctor-block .dtgl{font-family:'Caveat',cursive;font-size:15px;margin-top:0.5mm;}
  .cell .body-rx{flex:1;margin-top:3mm;}
  .rx-item{margin-bottom:4mm;}
  .rx-item .rline{font-family:'Caveat',cursive;font-size:17px;font-weight:600;color:#1a1a2e;}
  .rx-item .sline{font-family:'Caveat',cursive;font-size:16px;margin-left:5mm;margin-top:0.5mm;color:#1a1a2e;}
  .rx-close{border-bottom:1.3px solid #1a1a2e;width:75%;margin:2mm 0 1mm auto;position:relative;transform:rotate(-0.6deg);}
  .rx-close:after{content:"/";position:absolute;right:-3mm;top:-3mm;font-size:11px;}
  .cell .footer{margin-top:auto;}
  .cell .footer .pro{font-family:'Caveat',cursive;font-size:16px;color:#1a1a2e;}
  .cell .footer .alg{font-family:'Caveat',cursive;font-size:15px;color:#1a1a2e;}
  .cell .foot-table{width:100%;border-collapse:collapse;margin-top:2mm;}
  .cell .foot-table td,.cell .foot-table th{border:1px solid #444;font-size:6.5px;text-align:center;padding:0.5mm;}

  @media print{
    body *{visibility:hidden;}
    #sheetArea, #sheetArea *{visibility:visible;}
    #sheetArea{position:absolute;left:0;top:0;}
    .page{box-shadow:none;margin:0;}
    @page{ size:215mm 330mm; margin:0; }
  }
</style>
</head>
<body>
<header>
  <h1>Generator Resep dari Work Order Notes — RS Panti Rapih (Prototipe)</h1>
  <p>Foto notes → ekstraksi otomatis (AI) → koreksi manual → cetak resep F4 (4 resep/lembar)</p>
</header>

<div class="wrap">
  <div class="panel" id="controls">
    <h2>1. Foto Work Order</h2>
    <label>Nama Dokter (default untuk semua resep)</label>
    <input type="text" id="doctorName" placeholder="dr. Indra Wira">

    <label>Upload foto notes</label>
    <input type="file" id="photoInput" accept="image/*">
    <img id="photoThumb" class="thumb" style="display:none">

    <label>Token Akses Aplikasi (dari admin IGD, bukan API key)</label>
    <input type="password" id="appToken" placeholder="token staf...">

    <div style="margin-top:10px;display:flex;gap:8px;">
      <button class="btn-primary" id="btnExtract">Ekstrak Otomatis (AI)</button>
      <button class="btn-secondary" id="btnManual">+ Tambah Resep Manual</button>
    </div>
    <div id="status"></div>

    <h2 style="margin-top:18px;">2. Daftar Resep (bisa dikoreksi)</h2>
    <div id="resepList"></div>

    <button class="btn-primary" id="btnRender" style="width:100%;margin-top:10px;">Generate Preview →</button>
  </div>

  <div class="panel" id="preview">
    <h2>3. Preview Cetak (F4, 4 resep/lembar) <button class="btn-secondary" id="btnPrint" style="float:right;">Cetak / Simpan PDF</button></h2>
    <div id="sheetArea"></div>
  </div>
</div>

<script>
const ROMAN_MAP = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
function toRoman(num){
  num = parseInt(num)||1;
  let res='';
  for(const [v,s] of ROMAN_MAP){ while(num>=v){res+=s; num-=v;} }
  return res;
}
function fromRoman(str){
  if(!str) return 1;
  str = str.toUpperCase().trim();
  if(/^\d+$/.test(str)) return parseInt(str);
  const map = {I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  let total=0, prev=0;
  for(let i=str.length-1;i>=0;i--){
    const v = map[str[i]]||0;
    if(v<prev) total-=v; else total+=v;
    prev=v;
  }
  return total||1;
}

let resepData = []; // {rm, patientName, date:'YYYY-MM-DD', items:[{obat,jumlah}]}

function newResep(){
  return { rm:'', patientName:'', date:'', items:[{obat:'', jumlah:1}] };
}

function addResep(data){
  resepData.push(data || newResep());
  renderForm();
}

function renderForm(){
  const list = document.getElementById('resepList');
  list.innerHTML = '';
  resepData.forEach((r, idx)=>{
    const card = document.createElement('div');
    card.className = 'resep-card';
    card.innerHTML = `
      <h3>Resep #${idx+1} <button class="btn-danger" style="float:right;" onclick="removeResep(${idx})">Hapus</button></h3>
      <label>No. RM</label>
      <input type="text" value="${r.rm}" oninput="resepData[${idx}].rm=this.value">
      <label>Nama Pasien</label>
      <input type="text" value="${r.patientName}" oninput="resepData[${idx}].patientName=this.value">
      <label>Tanggal</label>
      <input type="date" value="${r.date}" oninput="resepData[${idx}].date=this.value">
      <label>Obat</label>
      <div id="items-${idx}"></div>
      <button class="btn-add" style="margin-top:4px;padding:4px 8px;font-size:11px;" onclick="addItem(${idx})">+ Obat</button>
    `;
    list.appendChild(card);
    const itemsDiv = card.querySelector(`#items-${idx}`);
    r.items.forEach((it, j)=>{
      const row = document.createElement('div');
      row.className = 'obat-row';
      row.innerHTML = `
        <input type="text" placeholder="Nama obat (mis. Etanyl Inj)" value="${it.obat}" oninput="resepData[${idx}].items[${j}].obat=this.value">
        <input type="text" class="jml" placeholder="I" value="${toRoman(it.jumlah)}" oninput="resepData[${idx}].items[${j}].jumlah=fromRoman(this.value)">
        <span onclick="removeItem(${idx},${j})" style="cursor:pointer;" title="Hapus obat">✕</span>
      `;
      itemsDiv.appendChild(row);
    });
  });
}
function removeResep(idx){ resepData.splice(idx,1); renderForm(); }
function addItem(idx){ resepData[idx].items.push({obat:'',jumlah:1}); renderForm(); }
function removeItem(idx,j){ resepData[idx].items.splice(j,1); if(resepData[idx].items.length===0) resepData[idx].items.push({obat:'',jumlah:1}); renderForm(); }

document.getElementById('btnManual').onclick = ()=>addResep();

// ---- Photo preview ----
document.getElementById('photoInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const img = document.getElementById('photoThumb');
    img.src = reader.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

// ---- App token persistence (NOT an Anthropic key — just app-level access control) ----
const appTokenInput = document.getElementById('appToken');
appTokenInput.value = localStorage.getItem('resep_app_token') || '';
appTokenInput.addEventListener('change', ()=> localStorage.setItem('resep_app_token', appTokenInput.value));

function setStatus(msg, cls){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

// ---- AI extraction ----
document.getElementById('btnExtract').onclick = async ()=>{
  const file = document.getElementById('photoInput').files[0];
  const token = appTokenInput.value.trim();
  if(!file){ setStatus('Pilih foto notes terlebih dahulu.', 'err'); return; }

  setStatus('Mengekstrak data dari foto...', 'busy');
  try{
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';

    // Foto dikirim ke backend proxy kita sendiri (/api/extract).
    // Backend yang menyimpan API key Claude secara aman (server-side env var) dan
    // meneruskan permintaan ke Anthropic — API key TIDAK PERNAH ada di browser.
    const resp = await fetch('/api/extract', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        ...(token ? { 'authorization': 'Bearer ' + token } : {})
      },
      body: JSON.stringify({ imageBase64: base64, mediaType })
    });

    const parsed = await resp.json();
    if(!resp.ok){ throw new Error(parsed.error || ('HTTP ' + resp.status)); }

    if(parsed.doctor) document.getElementById('doctorName').value = parsed.doctor;
    resepData = (parsed.resep||[]).map(r=>({
      rm: r.rm||'', patientName: r.patientName||'', date: r.date||'',
      items: (r.items&&r.items.length? r.items : [{obat:'',jumlah:1}]).map(it=>({obat:it.obat||'', jumlah: it.jumlah||1}))
    }));
    renderForm();
    setStatus(`Berhasil mengekstrak ${resepData.length} resep. Silakan periksa & koreksi sebelum cetak.`, 'ok');
  }catch(err){
    console.error(err);
    setStatus('Gagal ekstraksi: ' + err.message, 'err');
  }
};

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---- Render print sheets ----
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  if(!y) return iso;
  return `${d}-${m}-${y}`;
}

function cellHTML(r){
  if(!r){
    return `<div class="cell empty"></div>`;
  }
  const itemsHTML = r.items.map(it=>`
    <div class="rx-item">

      <div class="sline">S i.m.m</div>
      <div class="rx-close"></div>
    </div>`).join('');
  const doctorName = document.getElementById('doctorName').value || '';

function escapeHTML(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.getElementById('btnRender').onclick = ()=>{
  const area = document.getElementById('sheetArea');
  area.innerHTML = '';
  const pages = Math.ceil(resepData.length/4) || 0;
  if(pages===0){ area.innerHTML = '<p style="padding:20px;color:#888;">Belum ada resep. Tambahkan resep manual atau ekstrak dari foto.</p>'; return; }
  for(let p=0;p<pages;p++){
    const pageDiv = document.createElement('div');
    pageDiv.className = 'page';
    for(let i=0;i<4;i++){
      const r = resepData[p*4+i];
      pageDiv.innerHTML += cellHTML(r);
    }
    area.appendChild(pageDiv);
  }
};

document.getElementById('btnPrint').onclick = ()=> window.print();
